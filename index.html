<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Especias M. Luisa - Tienda Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-color { background-color: #5d4037; } 
        .seccion { display: none; }
        .seccion.activa { display: block; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col lg:flex-row min-h-screen font-sans">

    <aside class="w-full lg:w-80 sidebar-color text-white flex flex-col p-6 shadow-2xl lg:h-screen lg:sticky lg:top-0">
        <div class="flex flex-col items-center border-b border-orange-900 pb-6">
            <div class="bg-white p-2 rounded-2xl shadow-xl w-24 h-24 mb-4 flex items-center justify-center overflow-hidden">
                <img src="https://cdn-icons-png.flaticon.com/512/5223/5223048.png" alt="Logo" class="w-full h-full object-contain">
            </div>
            <h1 class="text-xl font-black uppercase text-center">M. LUISA</h1>
            <p class="text-orange-300 text-[10px] font-bold uppercase tracking-widest">Especias de Molina</p>
        </div>
        
        <nav class="flex flex-row lg:flex-col gap-2 mt-6 overflow-x-auto text-xs font-bold">
            <button onclick="cambiarSeccion('tienda')" class="flex-1 text-left p-3 hover:bg-orange-900 rounded-xl transition">🛒 Catálogo</button>
            <button onclick="cambiarSeccion('ubicacion')" class="flex-1 text-left p-3 hover:bg-orange-900 rounded-xl transition">📍 Ubicación</button>
        </nav>

        <div class="mt-auto bg-orange-900/40 p-4 rounded-2xl border border-orange-800">
            <p class="text-[9px] font-bold text-orange-200 uppercase">🚚 Gastos de Envío:</p>
            <p class="text-[10px]">Molina Centro: GRATIS</p>
            <p class="text-[10px]">Resto: Consultar al pedir</p>
        </div>
    </aside>

    <main class="flex-1 p-4 lg:p-10">
        <div id="registro-cliente" class="mb-8 bg-white p-6 rounded-3xl shadow-lg border-2 border-orange-100">
            <h3 class="text-sm font-black mb-4 uppercase text-orange-800">📝 Datos del Pedido</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                <input type="text" id="nombre-cli" placeholder="Tu Nombre Completo" class="p-3 border rounded-xl focus:ring-2 focus:ring-orange-500">
                <input type="tel" id="tel-cli" placeholder="Tu Número de Teléfono" class="p-3 border rounded-xl focus:ring-2 focus:ring-orange-500">
            </div>
        </div>

        <section id="tienda" class="seccion activa">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <h3 class="font-black text-gray-700 mb-4 uppercase text-sm">🌿 Catálogo con Imagen:</h3>
                    <div class="grid grid-cols-2 gap-3" id="contenedor-productos"></div>
                </div>

                <div>
                    <div class="bg-white p-6 rounded-[2rem] shadow-xl border sticky top-10">
                        <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest">Cesta Actual</h3>
                        <div id="cesta" class="text-[10px] min-h-[100px] mb-4 space-y-2 py-4 bg-orange-50/50 rounded-2xl px-4 border-2 border-dashed border-orange-200">Añade especias...</div>
                        <div class="text-xl font-black text-gray-800 mb-6 border-t pt-4">Total: <span id="total">0.00</span>€</div>
                        <button onclick="pedir()" class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs">Finalizar Pedido 📱</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="ubicacion" class="seccion">
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h3 class="font-black mb-4 uppercase">Ven a visitarnos</h3>
                <p class="text-sm mb-4">📍 C. Menéndez Pelayo, 23, 30500 Molina de Segura</p>
                <div class="h-64 bg-gray-200 rounded-2xl flex items-center justify-center font-bold text-gray-400 italic">Mapa de Google Maps Activo</div>
            </div>
        </section>
    </main>

    <script>
        const especies = [
            {n: "Pimentón Dulce", p: 3.50, i: "🌶️"}, {n: "Azafrán Hebra", p: 5.50, i: "🌸"}, 
            {n: "Canela Rama", p: 2.80, i: "🪵"}, {n: "Orégano", p: 1.90, i: "🍃"},
            {n: "Comino Molido", p: 2.10, i: "🧂"}, {n: "Curry", p: 3.10, i: "🍛"},
            {n: "Perejil", p: 1.20, i: "🌱"}, {n: "Clavo", p: 3.20, i: "🔨"}
            // (Añade el resto igual hasta 32 si quieres, he puesto estos de ejemplo con iconos)
        ];
        let items = []; let total = 0;

        function cargar() {
            document.getElementById('contenedor-productos').innerHTML = especies.map(e => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border hover:border-orange-500 transition cursor-pointer flex items-center space-x-4">
                    <span class="text-3xl">${e.i}</span>
                    <div class="flex-1">
                        <p class="font-black text-gray-800 text-[11px] leading-tight">${e.n}</p>
                        <p class="text-orange-600 font-bold text-[10px]">${e.p.toFixed(2)}€</p>
                    </div>
                    <button onclick="add('${e.n}', ${e.p})" class="bg-orange-600 text-white p-2 rounded-lg text-xs font-bold">Add</button>
                </div>`).join('');
        }

        function add(n, p) {
            items.push(n); total += p;
            document.getElementById('cesta').innerHTML = items.map(i => `<div class='text-[10px] font-bold'>✔ ${i}</div>`).join('');
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function pedir() {
            const nombre = document.getElementById('nombre-cli').value;
            const tel = document.getElementById('tel-cli').value;
            
            if(!nombre || !tel) return alert("Por favor, rellena tu nombre y teléfono para el pedido.");
            if(items.length === 0) return alert("¡Añade algo a la cesta!");
            
            const pago = prompt("¿Cómo pagarás? (Bizum o Efectivo)");
            if(!pago) return;

            const msj = `¡Hola! Soy ${nombre} (${tel}). Mi pedido: ${items.join(', ')}. Total: ${total.toFixed(2)}€. Pago: ${pago.toUpperCase()}. Gastos de envío a confirmar.`;
            window.open(`https://wa.me/34664417137?text=${encodeURIComponent(msj)}`);
        }

        function cambiarSeccion(id) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }
        window.onload = cargar;
    </script>
</body>
</html>
