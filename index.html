<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos María Luisa - Almacén Profesional de Especias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-color { background-color: #5d4037; } 
        .seccion { display: none; }
        .seccion.activa { display: block; }
        .logo-circle { width: 80px; height: 80px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #a16207; margin-bottom: 1rem; }
        .logo-text { font-size: 28px; font-weight: 900; color: #a16207; }

        .product-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 0.75rem;
            background-color: #f3f4f6;
            border: 1px solid #e5e7eb;
            filter: contrast(1.05) saturate(1.05);
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col lg:flex-row min-h-screen font-sans">

<aside class="w-full lg:w-72 sidebar-color text-white p-6 flex flex-col shadow-xl lg:h-screen lg:sticky lg:top-0 shrink-0">
    <div class="flex flex-col items-center border-b border-orange-900 pb-4 mb-6 text-center">
        <div class="logo-circle"><span class="logo-text">PML</span></div>
        <h1 class="text-lg font-bold uppercase leading-tight">Productos María Luisa</h1>
        <p class="text-orange-300 text-[10px] uppercase tracking-widest mt-1">Especias de Molina</p>
    </div>

    <nav class="space-y-2 mb-6">
        <button onclick="cambiarSeccion('tienda')" class="w-full text-left p-3 hover:bg-orange-900 rounded-lg font-bold text-sm">🛒 Catálogo</button>
        <button onclick="cambiarSeccion('ubicacion')" class="w-full text-left p-3 hover:bg-orange-900 rounded-lg font-bold text-sm">📍 Ubicación</button>
    </nav>
</aside>

<main class="flex-1 p-6">
<section id="tienda" class="seccion activa">
<div class="grid grid-cols-2 sm:grid-cols-3 gap-4" id="contenedor-productos"></div>
</section>

<section id="ubicacion" class="seccion">
    <div class="bg-white p-8 rounded-3xl shadow-xl text-center">
        <h3 class="font-black text-orange-800 uppercase mb-4 text-xl">📍 Almacén</h3>
        <p>Calle Menéndez Pelayo, 23<br>Molina de Segura</p>
    </div>
</section>
</main>

function cargar(){
const cont=document.getElementById('contenedor-productos');
especies.forEach(e=>{
cont.innerHTML+=`
<div class="bg-white p-3 rounded-2xl shadow-sm">
<img src="${e.img}" class="product-img mb-2">
<h4 class="text-xs font-bold">${e.n}</h4>
<p class="text-orange-600 font-bold">${e.p}€</p>
</div>`
})
}

function cambiarSeccion(id){
document.querySelectorAll('.seccion').forEach(s=>s.classList.remove('activa'));
document.getElementById(id).classList.add('activa');
}

window.onload=cargar;
</script>

</body>
</html>
