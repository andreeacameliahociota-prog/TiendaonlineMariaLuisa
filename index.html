<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos María Luisa - Especias de Molina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-color { background-color: #5d4037; } 
        .seccion { display: none; }
        .seccion.activa { display: block; }
        .logo-circle { width: 80px; height: 80px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #a16207; margin-bottom: 1rem; }
        .logo-text { font-size: 28px; font-weight: 900; color: #a16207; }
        .product-img { width: 100%; height: 110px; object-fit: cover; border-radius: 0.75rem; background-color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col lg:flex-row min-h-screen">

    <aside class="w-full lg:w-72 sidebar-color text-white p-6 flex flex-col shadow-xl lg:h-screen lg:sticky lg:top-0">
        <div class="flex flex-col items-center border-b border-orange-900 pb-4 mb-6">
            <div class="logo-circle"><span class="logo-text">PML</span></div>
            <h1 class="text-lg font-bold uppercase text-center">Productos María Luisa</h1>
            <p class="text-orange-300 text-[10px] uppercase tracking-widest">Especias de Molina</p>
        </div>
        
        <nav class="space-y-2 mb-6">
            <button onclick="cambiarSeccion('tienda')" class="w-full text-left p-3 hover:bg-orange-900 rounded-lg font-bold text-sm transition">🛒 Catálogo</button>
            <button onclick="cambiarSeccion('ubicacion')" class="w-full text-left p-3 hover:bg-orange-900 rounded-lg font-bold text-sm transition">📍 Ubicación</button>
        </nav>

        <div class="mt-auto bg-black/20 p-4 rounded-lg text-[10px] border border-orange-800">
            <p class="font-bold text-orange-200 uppercase mb-1">🚚 Gastos de Envío:</p>
            <p>Molina de Segura: **GRATIS**</p>
            <p>Resto de España: 4.95€</p>
        </div>
    </aside>

    <main class="flex-1 p-4 lg:p-8">
        <div class="bg-white p-6 rounded-2xl shadow-md mb-6 border-l-4 border-orange-500">
            <h2 class="text-xs font-black uppercase text-gray-500 mb-4 tracking-tighter">📝 Registro de Cliente</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="nombre-cli" placeholder="Nombre completo" class="p-3 border rounded-xl w-full text-sm outline-none focus:ring-2 focus:ring-orange-400">
                <input type="tel" id="tel-cli" placeholder="Teléfono de contacto" class="p-3 border rounded-xl w-full text-sm outline-none focus:ring-2 focus:ring-orange-400">
            </div>
        </div>

        <section id="tienda" class="seccion activa">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <h3 class="font-bold text-gray-700 mb-4 uppercase text-sm">🌿 Catálogo (32 Especias)</h3>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-4" id="contenedor-productos"></div>
                </div>

                <div class="lg:sticky lg:top-8 h-fit">
                    <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 text-center">
                        <h3 class="text-[10px] font-black uppercase text-gray-400 mb-4">Tu Pedido</h3>
                        <div id="cesta" class="text-[10px] text-gray-500 mb-6 bg-gray-50 p-4 rounded-xl min-h-[80px]">Tu cesta está vacía</div>
                        <div class="text-3xl font-black text-gray-800 mb-6"><span id="total">0.00</span>€</div>
                        <button onclick="enviarWhatsApp()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-green-700 transition uppercase text-xs">Confirmar Pedido 📱</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="ubicacion" class="seccion">
            <div class="bg-white p-8 rounded-3xl shadow-lg">
                <h3 class="font-bold text-orange-800 uppercase mb-2">📍 Punto de Venta</h3>
                <p class="text-gray-600">Almacén: Molina de Segura - Calle Menéndez Pelayo, 23</p>
            </div>
        </section>
    </main>

    <script>
        const especies = [
            {n: "Canela Molida", p: 2.50, img: "https://images.unsplash.com/photo-1509358271058-acd22cc93898?w=400"},
            {n: "Pimentón Dulce", p: 3.50, img: "https://images.unsplash.com/photo-1512132411229-c30391241dd8?w=400"},
            {n: "Azafrán Hebra", p: 5.50, img: "https://images.unsplash.com/photo-1615485290382-441e4d049cb5?w=400"},
            {n: "Clavo de Olor", p: 3.20, img: "https://images.unsplash.com/photo-1611080626919-7cf5a9dbab5b?w=400"},
            {n: "Comino Grano", p: 2.10, img: "https://images.unsplash.com/photo-1615484477778-ca3b77942253?w=400"},
            {n: "Cúrcuma", p: 2.40, img: "https://images.unsplash.com/photo-1615485500704-8e990f3900f7?w=400"},
            {n: "Jengibre", p: 2.60, img: "https://images.unsplash.com/photo-1550989460-0adf9ea622e2?w=400"},
            {n: "Orégano", p: 1.90, img: "https://images.unsplash.com/photo-1608797178974-15b35a643b6b?w=400"},
            {n: "Pimienta Negra", p: 2.50, img: "https://images.unsplash.com/photo-1509358271058-acd22cc93898?w=400"},
            {n: "Romero", p: 1.70, img: "https://images.unsplash.com/photo-1528133080231-186b6680a6b7?w=400"},
            {n: "Tomillo", p: 1.70, img: "https://images.unsplash.com/photo-1518719662051-7871b6d1947b?w=400"},
            {n: "Laurel", p: 1.50, img: "https://images.unsplash.com/photo-1518929112282-e304899f8d18?w=400"},
            {n: "Anís Estrellado", p: 4.50, img: "https://images.unsplash.com/photo-1601004890684-d8cbf393f922?w=400"},
            {n: "Perejil", p: 1.20, img: "https://images.pexels.com/photos/1435904/pexels-photo-1435904.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Curry Madras", p: 3.10, img: "https://images.unsplash.com/photo-1584436100690-369403889601?w=400"},
            {n: "Nuez Moscada", p: 3.80, img: "https://images.unsplash.com/photo-1532187863486-abf9d3a3522a?w=400"},
            {n: "Ajo Molido", p: 1.50, img: "https://images.unsplash.com/photo-1620189531100-348633e9d8e7?w=400"},
            {n: "Cayena", p: 2.20, img: "https://images.unsplash.com/photo-1614734808119-0b7a83d1c166?w=400"},
            {n: "Cebolla Polvo", p: 1.80, img: "https://images.pexels.com/photos/2363345/pexels-photo-2363345.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Hierbabuena", p: 1.40, img: "https://images.unsplash.com/photo-1616260749007-8899ac405e32?w=400"},
            {n: "Coriandro", p: 2.30, img: "https://images.unsplash.com/photo-1624454002302-36b824d7911c?w=400"},
            {n: "Eneldo", p: 1.90, img: "https://images.unsplash.com/photo-1596452292837-183008064402?w=400"},
            {n: "Mostaza Grano", p: 2.10, img: "https://images.unsplash.com/photo-1615485500704-8e990f3900f7?w=400"},
            {n: "Vainilla Rama", p: 6.00, img: "https://images.unsplash.com/photo-1596716766436-1216a67f62e8?w=400"},
            {n: "Sal Himalaya", p: 2.10, img: "https://images.unsplash.com/photo-1615485290382-441e4d049cb5?w=400"},
            {n: "Ras el Hanout", p: 3.50, img: "https://images.unsplash.com/photo-1584436100690-369403889601?w=400"},
            {n: "Hierbas Provenza", p: 1.70, img: "https://images.pexels.com/photos/1435862/pexels-photo-1435862.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Comino Molido", p: 2.10, img: "https://images.pexels.com/photos/4199120/pexels-photo-4199120.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Pebre", p: 2.40, img: "https://images.pexels.com/photos/1435858/pexels-photo-1435858.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Canela Rama", p: 2.80, img: "https://images.pexels.com/photos/4033296/pexels-photo-4033296.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Sal Ahumada", p: 2.10, img: "https://images.pexels.com/photos/932588/pexels-photo-932588.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Salvia", p: 1.80, img: "https://images.pexels.com/photos/3375118/pexels-photo-3375118.jpeg?auto=compress&cs=tinysrgb&w=400"}
        ];
        
        let items = []; let total = 0;

        function cargar() {
            document.getElementById('contenedor-productos').innerHTML = especies.map(e => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-transparent hover:border-orange-500 transition">
                    <img src="${e.img}" class="product-img mb-2 shadow-inner">
                    <h4 class="font-bold text-[10px] text-gray-800 uppercase leading-tight">${e.n}</h4>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-orange-600 font-bold text-xs">${e.p.toFixed(2)}€</span>
                        <button onclick="add('${e.n}', ${e.p})" class="bg-orange-600 text-white px-3 py-1 rounded-lg text-[9px] font-black uppercase">Add</button>
                    </div>
                </div>`).join('');
        }

        function add(n, p) {
            items.push(n); total += p;
            document.getElementById('cesta').innerHTML = items.map(i => `<p class="mb-1 border-b border-gray-100 text-[9px] uppercase">✔ ${i}</p>`).join('');
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function enviarWhatsApp() {
            const nom = document.getElementById('nombre-cli').value;
            const tel = document.getElementById('tel-cli').value;
            if(!nom || !tel) return alert("Por favor, rellena tu nombre y teléfono.");
            if(items.length === 0) return alert("Añade especias a la cesta primero.");
            const pago = prompt("¿Pago por Bizum o Efectivo?");
            if(!pago) return;
            let m = `*PEDIDO PRODUCTOS MARÍA LUISA*\n*Cliente:* ${nom}\n*Tel:* ${tel}\n\n*Productos:*\n- ${items.join('\n- ')}\n\n*Total:* ${total.toFixed(2)}€\n*Pago:* ${pago.toUpperCase()}`;
            window.open("https://wa.me/34664417137?text=" + encodeURIComponent(m));
        }

        function cambiarSeccion(id) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }
        window.onload = cargar;
    </script>
</body>
</html>
