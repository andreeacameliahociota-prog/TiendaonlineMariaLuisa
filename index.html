<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos María Luisa - Especias de Molina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-color { background-color: #5d4037; } 
        .seccion { display: none; }
        .seccion.activa { display: block; }
        .logo-circle { width: 90px; height: 90px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #a16207; margin-bottom: 1rem; }
        .logo-text { font-size: 32px; font-weight: 900; color: #a16207; }
        /* Imagen ajustada para que se vea profesional */
        .product-img { width: 100%; height: 110px; object-fit: cover; border-radius: 0.75rem; border: 1px solid #ddd; background-color: #f9f9f9; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col lg:flex-row min-h-screen font-sans">

    <aside class="w-full lg:w-80 sidebar-color text-white flex flex-col p-6 lg:p-8 shadow-2xl lg:h-screen lg:sticky lg:top-0 shrink-0">
        <div class="flex flex-col items-center border-b border-orange-900 pb-6 mb-6 text-center">
            <div class="logo-circle">
                <span class="logo-text">PML</span>
            </div>
            <h1 class="text-xl font-black uppercase tracking-tighter leading-tight">Productos María Luisa</h1>
            <p class="text-orange-300 text-[10px] font-bold uppercase tracking-[0.2em] mt-1">Especias de Molina</p>
        </div>
        
        <nav class="flex flex-row lg:flex-col gap-2 mb-6 text-xs font-bold">
            <button onclick="cambiarSeccion('tienda')" class="flex-1 text-left p-3 hover:bg-orange-900 rounded-xl transition">🛒 Catálogo</button>
            <button onclick="cambiarSeccion('ubicacion')" class="flex-1 text-left p-3 hover:bg-orange-900 rounded-xl transition">📍 Ubicación</button>
        </nav>

        <div class="mt-auto bg-black/20 p-4 rounded-xl text-[10px] border border-orange-800">
            <p class="text-orange-200 font-bold uppercase mb-1">🚚 Envío:</p>
            <p>Molina de Segura: **GRATIS**</p>
            <p>Resto España: 4.95€</p>
        </div>
    </aside>

    <main class="flex-1 p-4 lg:p-10">
        <div class="mb-6 bg-white p-6 rounded-3xl shadow-sm border border-orange-100">
            <h3 class="text-[10px] font-black text-orange-800 uppercase mb-2 tracking-widest">📝 Datos de entrega</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="nombre-cli" placeholder="Nombre completo" class="text-xs p-3 border rounded-xl w-full">
                <input type="tel" id="tel-cli" placeholder="Teléfono" class="text-xs p-3 border rounded-xl w-full">
            </div>
        </div>

        <section id="tienda" class="seccion activa">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 order-2 lg:order-1">
                    <h3 class="text-sm font-black text-gray-700 mb-4 uppercase">🌿 Catálogo de Especias</h3>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="contenedor-productos"></div>
                </div>

                <div class="order-1 lg:order-last">
                    <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-gray-100 lg:sticky lg:top-10">
                        <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest">Tu Pedido</h3>
                        <div id="cesta" class="text-[10px] font-medium text-gray-600 mb-6 min-h-[100px] space-y-1 py-4 bg-orange-50/50 rounded-2xl px-4 border-2 border-dashed border-orange-200">Añade productos...</div>
                        <div class="flex justify-between items-center border-t pt-4 mb-6">
                            <span class="text-2xl font-black text-gray-800"><span id="total">0.00</span>€</span>
                        </div>
                        <button onclick="enviarWhatsApp()" class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-lg uppercase text-[11px] hover:bg-green-700 transition">Enviar Pedido 📱</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="ubicacion" class="seccion">
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h3 class="font-black mb-4 uppercase text-orange-800">📍 Molina de Segura</h3>
                <p class="text-sm text-gray-600">C. Menéndez Pelayo, 23</p>
            </div>
        </section>
    </main>

    <script>
        // LISTA CON IMÁGENES DE ALTA CALIDAD ESPECÍFICAS
        const especies = [
            {n: "Canela Molida", p: 2.50, img: "https://images.pexels.com/photos/4033280/pexels-photo-4033280.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Pimentón Dulce", p: 3.50, img: "https://images.pexels.com/photos/1340116/pexels-photo-1340116.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Azafrán", p: 5.50, img: "https://images.pexels.com/photos/14104253/pexels-photo-14104253.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Clavo", p: 3.20, img: "https://images.pexels.com/photos/1126365/pexels-photo-1126365.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Comino", p: 2.10, img: "https://images.pexels.com/photos/4199120/pexels-photo-4199120.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Cúrcuma", p: 2.40, img: "https://images.pexels.com/photos/161556/turmeric-curcuma-curcumin-food-161556.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Jengibre", p: 2.60, img: "https://images.pexels.com/photos/161439/ginger-plant-root-spices-161439.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Orégano", p: 1.90, img: "https://images.pexels.com/photos/1435861/pexels-photo-1435861.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Pimienta Negra", p: 2.50, img: "https://images.pexels.com/photos/1090159/pexels-photo-1090159.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Pimienta Blanca", p: 2.70, img: "https://images.pexels.com/photos/4199131/pexels-photo-4199131.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Romero", p: 1.70, img: "https://images.pexels.com/photos/461245/pexels-photo-461245.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Tomillo", p: 1.70, img: "https://images.pexels.com/photos/1435863/pexels-photo-1435863.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Laurel", p: 1.50, img: "https://images.pexels.com/photos/4113061/pexels-photo-4113061.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Anís Estrellado", p: 4.50, img: "https://images.pexels.com/photos/3382755/pexels-photo-3382755.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Canela Rama", p: 2.80, img: "https://images.pexels.com/photos/4033296/pexels-photo-4033296.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Curry", p: 3.10, img: "https://images.pexels.com/photos/1583563/pexels-photo-1583563.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Nuez Moscada", p: 3.80, img: "https://images.pexels.com/photos/1011311/pexels-photo-1011311.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Perejil", p: 1.20, img: "https://images.pexels.com/photos/1435904/pexels-photo-1435904.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Ajo Molido", p: 1.50, img: "https://images.pexels.com/photos/1393382/pexels-photo-1393382.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Cayena", p: 2.20, img: "https://images.pexels.com/photos/534346/pexels-photo-534346.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Sal Ahumada", p: 2.10, img: "https://images.pexels.com/photos/932588/pexels-photo-932588.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Ras el Hanout", p: 3.50, img: "https://images.pexels.com/photos/1435860/pexels-photo-1435860.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Hierbabuena", p: 1.40, img: "https://images.pexels.com/photos/6316531/pexels-photo-6316531.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Cebolla Polvo", p: 1.80, img: "https://images.pexels.com/photos/2363345/pexels-photo-2363345.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Coriandro", p: 2.30, img: "https://images.pexels.com/photos/3375116/pexels-photo-3375116.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Eneldo", p: 1.90, img: "https://images.pexels.com/photos/1435859/pexels-photo-1435859.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Mostaza", p: 2.10, img: "https://images.pexels.com/photos/131014/pexels-photo-131014.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Provenza", p: 1.70, img: "https://images.pexels.com/photos/1435862/pexels-photo-1435862.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Vainilla", p: 6.00, img: "https://images.pexels.com/photos/4199124/pexels-photo-4199124.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Sal Himalaya", p: 2.10, img: "https://images.pexels.com/photos/6368817/pexels-photo-6368817.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Salvia", p: 1.80, img: "https://images.pexels.com/photos/3375118/pexels-photo-3375118.jpeg?auto=compress&cs=tinysrgb&w=400"},
            {n: "Pebre", p: 2.40, img: "https://images.pexels.com/photos/1435858/pexels-photo-1435858.jpeg?auto=compress&cs=tinysrgb&w=400"}
        ];
        
        let items = []; let total = 0;

        function cargarProductos() {
            document.getElementById('contenedor-productos').innerHTML = especies.map(e => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border hover:border-orange-500 transition flex flex-col h-full overflow-hidden">
                    <img src="${e.img}" alt="${e.n}" class="product-img mb-2 shadow-inner">
                    <p class="font-black text-gray-800 text-[10px] leading-tight mb-1 uppercase">${e.n}</p>
                    <div class="flex justify-between items-center mt-auto">
                        <p class="text-orange-600 font-bold text-[10px]">${e.p.toFixed(2)}€</p>
                        <button onclick="add('${e.n}', ${e.p})" class="bg-orange-600 text-white px-3 py-1 rounded-lg text-[8px] font-black uppercase hover:bg-orange-700">Añadir</button>
                    </div>
                </div>`).join('');
        }

        function add(n, p) {
            items.push(n); total += p;
            document.getElementById('cesta').innerHTML = items.map(i => `<div class='border-b border-orange-50 pb-1 text-[8px] font-bold uppercase'>✔ ${i}</div>`).join('');
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function enviarWhatsApp() {
            const n = document.getElementById('nombre-cli').value;
            const t = document.getElementById('tel-cli').value;
            if(!n || !t) return alert("Por favor, rellena tu nombre y teléfono.");
            if(items.length === 0) return alert("La cesta está vacía.");
            const pago = prompt("¿Bizum o Efectivo?");
            if(!pago) return;
            let m = `*PEDIDO PRODUCTOS MARÍA LUISA*\n\n*Cliente:* ${n}\n*Tel:* ${t}\n\n*Productos:*\n- ${items.join('\n- ')}\n\n*Total:* ${total.toFixed(2)}€\n*Pago:* ${pago.toUpperCase()}`;
            window.open("https://wa.me/34664417137?text=" + encodeURIComponent(m));
        }

        function cambiarSeccion(id) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }
        window.onload = cargarProductos;
    </script>
</body>
</html>
