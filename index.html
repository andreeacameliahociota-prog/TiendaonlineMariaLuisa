<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos María Luisa - Almacén de Especias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-color { background-color: #5d4037; } 
        .seccion { display: none; }
        .seccion.activa { display: block; }
        .logo-circle { width: 90px; height: 90px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #a16207; margin-bottom: 1rem; }
        .logo-text { font-size: 32px; font-weight: 900; color: #a16207; }
        .product-img { width: 100%; height: 110px; object-fit: cover; border-radius: 0.75rem; border: 1px solid #eee; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col lg:flex-row min-h-screen font-sans">

    <aside class="w-full lg:w-80 sidebar-color text-white flex flex-col p-6 lg:p-8 shadow-2xl lg:h-screen lg:sticky lg:top-0 shrink-0">
        <div class="flex flex-col items-center border-b border-orange-900 pb-6 mb-6 text-center">
            <div class="logo-circle">
                <span class="logo-text">PML</span>
            </div>
            <h1 class="text-xl font-black uppercase tracking-tighter leading-tight">Productos María Luisa</h1>
            <p class="text-orange-300 text-[10px] font-bold uppercase tracking-[0.2em] mt-1">Especias de Molina</p>
        </div>
        
        <nav class="flex flex-row lg:flex-col gap-2 mb-6 text-xs font-bold">
            <button onclick="cambiarSeccion('tienda')" class="flex-1 text-left p-3 hover:bg-orange-900 rounded-xl transition">🛒 Catálogo</button>
            <button onclick="cambiarSeccion('ubicacion')" class="flex-1 text-left p-3 hover:bg-orange-900 rounded-xl transition">📍 Ubicación</button>
        </nav>

        <div class="mt-auto bg-black/20 p-4 rounded-xl text-[10px] border border-orange-800">
            <p class="text-orange-200 font-bold uppercase mb-1">🚚 Gastos de Envío:</p>
            <p>Molina de Segura: **GRATIS**</p>
            <p>Resto de España: 4.95€</p>
        </div>
    </aside>

    <main class="flex-1 p-4 lg:p-10">
        <div class="mb-6 bg-white p-6 rounded-3xl shadow-sm border border-orange-100">
            <h3 class="text-[10px] font-black text-orange-800 uppercase mb-4 tracking-widest">📝 Registro de Cliente</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="nombre-cli" placeholder="Tu Nombre Completo" class="text-xs p-3 border rounded-xl w-full focus:ring-2 focus:ring-orange-400 outline-none">
                <input type="tel" id="tel-cli" placeholder="Tu Teléfono de contacto" class="text-xs p-3 border rounded-xl w-full focus:ring-2 focus:ring-orange-400 outline-none">
            </div>
        </div>

        <section id="tienda" class="seccion activa">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 order-2 lg:order-1">
                    <h3 class="text-sm font-black text-gray-700 mb-4 uppercase">🌿 Especias y Condimentos (32 Variedades)</h3>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="contenedor-productos"></div>
                </div>

                <div class="order-1 lg:order-last">
                    <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-gray-100 lg:sticky lg:top-10">
                        <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest">Tu Pedido</h3>
                        <div id="cesta" class="text-[10px] font-medium text-gray-600 mb-6 min-h-[100px] space-y-1 py-4 bg-orange-50/50 rounded-2xl px-4 border-2 border-dashed border-orange-200">Añade productos...</div>
                        <div class="flex justify-between items-center border-t pt-4 mb-6">
                            <span class="text-2xl font-black text-gray-800"><span id="total">0.00</span>€</span>
                        </div>
                        <button onclick="enviarWhatsApp()" class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-lg uppercase text-[11px] hover:bg-green-700 transition">Confirmar por WhatsApp 📱</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="ubicacion" class="seccion">
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h3 class="font-black mb-4 uppercase text-orange-800">📍 Molina de Segura</h3>
                <p class="text-sm text-gray-600">Almacén Central:<br>Calle Menéndez Pelayo, 23</p>
            </div>
        </section>
    </main>

    <script>
        // LISTA DE 32 ESPECIAS CON FOTOS REALES Y ESPECÍFICAS
        const especies = [
            {n: "Canela Molida", p: 2.50, img: "https://images.unsplash.com/photo-1599940824399-b87987ceb72a?w=400"},
            {n: "Pimentón Dulce", p: 3.50, img: "https://images.unsplash.com/photo-1512132411229-c30391241dd8?w=400"},
            {n: "Azafrán Hebra", p: 5.50, img: "https://images.unsplash.com/photo-1615485290382-441e4d049cb5?w=400"},
            {n: "Clavo de Olor", p: 3.20, img: "https://images.unsplash.com/photo-1611080626919-7cf5a9dbab5b?w=400"},
            {n: "Comino en Grano", p: 2.10, img: "https://images.unsplash.com/photo-1615484477778-ca3b77942253?w=400"},
            {n: "Cúrcuma", p: 2.40, img: "https://images.unsplash.com/photo-1615485500704-8e990f3900f7?w=400"},
            {n: "Jengibre Molido", p: 2.60, img: "https://images.unsplash.com/photo-1550989460-0adf9ea622e2?w=400"},
            {n: "Orégano Sierra", p: 1.90, img: "https://images.unsplash.com/photo-1608797178974-15b35a643b6b?w=400"},
            {n: "Pimienta Negra", p: 2.50, img: "https://images.unsplash.com/photo-1509358271058-acd22cc93898?w=400"},
            {n: "Pimienta Blanca", p: 2.70, img: "https://images.unsplash.com/photo-1533512900384-a46a12dfd7d5?w=400"},
            {n: "Romero Seco", p: 1.70, img: "https://images.unsplash.com/photo-1528133080231-186b6680a6b7?w=400"},
            {n: "Tomillo Hojas", p: 1.70, img: "https://images.unsplash.com/photo-1518719662051-7871b6d1947b?w=400"},
            {n: "Laurel Entero", p: 1.50, img: "https://images.unsplash.com/photo-1518929112282-e304899f8d18?w=400"},
            {n: "Anís Estrellado", p: 4.50, img: "https://images.unsplash.com/photo-1601004890684-d8cbf393f922?w=400"},
            {n: "Canela en Rama", p: 2.80, img: "https://images.unsplash.com/photo-1558961363-fa8fdf82db35?w=400"},
            {n: "Curry Madras", p: 3.10, img: "https://images.unsplash.com/photo-1584436100690-369403889601?w=400"},
            {n: "Nuez Moscada", p: 3.80, img: "https://images.unsplash.com/photo-1532187863486-abf9d3a3522a?w=400"},
            {n: "Perejil Seco", p: 1.20, img: "https://images.unsplash.com/photo-1467019749451-ea3323061270?w=400"},
            {n: "Ajo Molido", p: 1.50, img: "https://images.unsplash.com/photo-1620189531100-348633e9d8e7?w=400"},
            {n: "Cayena Entera", p: 2.20, img: "https://images.unsplash.com/photo-1614734808119-0b7a83d1c166?w=400"},
            {n: "Sal Ahumada", p: 2.10, img: "https://images.unsplash.com/photo-1504670073073-6123e39e0754?w=400"},
            {n: "Ras el Hanout", p: 3.50, img: "https://images.unsplash.com/photo-1584436100690-369403889601?w=400"},
            {n: "Hierbabuena", p: 1.40, img: "https://images.unsplash.com/photo-1616260749007-8899ac405e32?w=400"},
            {n: "Cebolla en Polvo", p: 1.80, img: "https://images.unsplash.com/photo-1618412661575-d2243619f074?w=400"},
            {n: "Coriandro", p: 2.30, img: "https://images.unsplash.com/photo-1624454002302-36b824d7911c?w=400"},
            {n: "Eneldo", p: 1.90, img: "https://images.unsplash.com/photo-1596452292837-183008064402?w=400"},
            {n: "Pebre Picante", p: 2.40, img: "https://images.unsplash.com/photo-1512132411229-c30391241dd8?w=400"},
            {n: "Comino Molido", p: 2.10, img: "https://images.unsplash.com/photo-1615484477201-9f4953340fab?w=400"},
            {n: "Vainilla en Rama", p: 6.00, img: "https://images.unsplash.com/photo-1596716766436-1216a67f62e8?w=400"},
            {n: "Mostaza en Grano", p: 2.10, img: "https://images.unsplash.com/photo-1615485500704-8e990f3900f7?w=400"},
            {n: "Hierbas Provenzales", p: 1.70, img: "https://images.unsplash.com/photo-1508747703725-71977713d540?w=400"},
            {n: "Sal del Himalaya", p: 2.10, img: "https://images.unsplash.com/photo-1615485290382-441e4d049cb5?w=400"}
        ];
        
        let items = []; let total = 0;

        function cargarProductos() {
            document.getElementById('contenedor-productos').innerHTML = especies.map(e => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border hover:border-orange-500 transition flex flex-col h-full overflow-hidden">
                    <img src="${e.img}" alt="${e.n}" class="product-img mb-2 shadow-inner">
                    <p class="font-black text-gray-800 text-[10px] leading-tight mb-1 uppercase">${e.n}</p>
                    <div class="flex justify-between items-center mt-auto">
                        <p class="text-orange-600 font-bold text-[10px]">${e.p.toFixed(2)}€</p>
                        <button onclick="add('${e.n}', ${e.p})" class="bg-orange-600 text-white px-3 py-1 rounded-lg text-[8px] font-black uppercase hover:bg-orange-700">Add</button>
                    </div>
                </div>`).join('');
        }

        function add(n, p) {
            items.push(n); total += p;
            document.getElementById('cesta').innerHTML = items.map(i => `<div class='border-b border-orange-50 pb-1 text-[8px] font-bold'>✔ ${i}</div>`).join('');
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function enviarWhatsApp() {
            const n = document.getElementById('nombre-cli').value;
            const t = document.getElementById('tel-cli').value;
            if(!n || !t) return alert("Por favor, rellena tu nombre y teléfono para procesar el pedido.");
            if(items.length === 0) return alert("La cesta está vacía.");
            
            const pago = prompt("¿Bizum o Efectivo?");
            if(!pago) return;

            let m = `*NUEVO PEDIDO - PRODUCTOS M. LUISA*\n\n*Cliente:* ${n}\n*Teléfono:* ${t}\n\n*Pedido:*\n- ${items.join('\n- ')}\n\n*Total:* ${total.toFixed(2)}€\n*Pago:* ${pago.toUpperCase()}`;
            window.open("https://wa.me/34664417137?text=" + encodeURIComponent(m));
        }

        function cambiarSeccion(id) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }
        window.onload = cargarProductos;
    </script>
</body>
</html>
