<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos María Luisa - Almacén de Especias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-color { background-color: #5d4037; } 
        .seccion { display: none; }
        .seccion.activa { display: block; }
        .logo-circle { width: 90px; height: 90px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #a16207; }
        .logo-text { font-size: 30px; font-weight: 900; color: #a16207; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col lg:flex-row min-h-screen font-sans">

    <aside class="w-full lg:w-80 sidebar-color text-white flex flex-col p-6 lg:p-8 shadow-2xl lg:h-screen lg:sticky lg:top-0 shrink-0">
        <div class="flex flex-col items-center border-b border-orange-900 pb-6 mb-6 text-center">
            <div class="logo-circle mb-4">
                <span class="logo-text">PML</span>
            </div>
            <h1 class="text-xl font-black uppercase tracking-tighter">Productos María Luisa</h1>
            <p class="text-orange-300 text-[10px] font-bold uppercase tracking-[0.2em]">Especias de Molina</p>
        </div>
        
        <nav class="flex flex-row lg:flex-col gap-2 mb-6 text-xs font-bold">
            <button onclick="cambiarSeccion('tienda')" class="flex-1 text-left p-3 hover:bg-orange-900 rounded-xl transition">🛒 Catálogo</button>
            <button onclick="cambiarSeccion('ubicacion')" class="flex-1 text-left p-3 hover:bg-orange-900 rounded-xl transition">📍 Ubicación</button>
        </nav>

        <div class="mt-auto bg-black/20 p-4 rounded-xl text-[10px] border border-orange-800">
            <p class="text-orange-200 font-bold uppercase mb-1">🚚 Gastos de Envío:</p>
            <p>Molina de Segura: **GRATIS**</p>
            <p>Resto: Desde 4.95€</p>
        </div>
    </aside>

    <main class="flex-1 p-4 lg:p-10">
        <div class="mb-6 bg-white p-6 rounded-3xl shadow-sm border border-orange-100">
            <h3 class="text-[10px] font-black text-orange-800 uppercase mb-4 tracking-widest">📝 Datos para el Pedido (Registro)</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="nombre-cli" placeholder="Nombre completo" class="text-xs p-3 border rounded-xl w-full">
                <input type="tel" id="tel-cli" placeholder="Teléfono WhatsApp" class="text-xs p-3 border rounded-xl w-full">
            </div>
        </div>

        <section id="tienda" class="seccion activa">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <h3 class="text-sm font-black text-gray-700 mb-4 uppercase">🌿 Nuestro Almacén (32 variedades)</h3>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="contenedor-productos"></div>
                </div>

                <div class="order-first lg:order-last">
                    <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-gray-100 lg:sticky lg:top-10">
                        <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest">Tu Cesta</h3>
                        <div id="cesta" class="text-[10px] font-medium text-gray-600 mb-6 min-h-[80px] space-y-1 py-4 bg-orange-50/50 rounded-2xl px-4 border-2 border-dashed border-orange-200">Vacía...</div>
                        <div class="flex justify-between items-center border-t pt-4 mb-6">
                            <span class="text-2xl font-black text-gray-800"><span id="total">0.00</span>€</span>
                        </div>
                        <button onclick="enviarWhatsApp()" class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-lg uppercase text-[11px]">Confirmar Pedido 📱</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="ubicacion" class="seccion">
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h3 class="font-black mb-4 uppercase">📍 Molina de Segura</h3>
                <p class="text-sm">C. Menéndez Pelayo, 23</p>
            </div>
        </section>
    </main>

    <script>
        // LISTA DE 32 PRODUCTOS CON IMÁGENES REALES DE ESPECIAS (STOCK PHOTOS)
        const especies = [
            {n: "Pimentón Dulce", p: 3.50, img: "https://cdn.pixabay.com/photo/2016/01/03/17/41/paprika-1119747_150.jpg"},
            {n: "Azafrán Hebra", p: 5.50, img: "https://cdn.pixabay.com/photo/2017/08/13/16/04/saffron-2637578_150.jpg"},
            {n: "Canela Rama", p: 2.80, img: "https://cdn.pixabay.com/photo/2016/03/14/15/48/cinnamon-1255648_150.jpg"},
            {n: "Clavo Entero", p: 3.20, img: "https://cdn.pixabay.com/photo/2014/12/22/12/33/cloves-577233_150.jpg"},
            {n: "Comino Grano", p: 2.10, img: "https://cdn.pixabay.com/photo/2016/01/15/15/00/cumin-1141904_150.jpg"},
            {n: "Cúrcuma Molida", p: 2.40, img: "https://cdn.pixabay.com/photo/2016/09/27/15/51/turmeric-1698711_150.jpg"},
            {n: "Jengibre Molido", p: 2.60, img: "https://cdn.pixabay.com/photo/2016/01/19/17/31/ginger-1149817_150.jpg"},
            {n: "Orégano Sierra", p: 1.90, img: "https://cdn.pixabay.com/photo/2014/11/05/16/00/oregano-518018_150.jpg"},
            {n: "Pimienta Negra", p: 2.50, img: "https://cdn.pixabay.com/photo/2016/01/14/11/33/pepper-1139707_150.jpg"},
            {n: "Pimienta Blanca", p: 2.70, img: "https://cdn.pixabay.com/photo/2015/05/11/14/17/white-pepper-762512_150.jpg"},
            {n: "Pimentón Picante", p: 3.50, img: "https://cdn.pixabay.com/photo/2014/11/03/11/04/chili-515058_150.jpg"},
            {n: "Romero Hojas", p: 1.70, img: "https://cdn.pixabay.com/photo/2016/08/29/18/12/rosemary-1628847_150.jpg"},
            {n: "Tomillo Seco", p: 1.70, img: "https://cdn.pixabay.com/photo/2017/04/05/11/19/thyme-2204731_150.jpg"},
            {n: "Laurel Hojas", p: 1.50, img: "https://cdn.pixabay.com/photo/2015/09/09/16/03/bay-leaf-932025_150.jpg"},
            {n: "Anís Estrellado", p: 4.50, img: "https://cdn.pixabay.com/photo/2016/04/21/22/02/star-anise-1344682_150.jpg"},
            {n: "Hierbabuena", p: 1.40, img: "https://cdn.pixabay.com/photo/2016/01/13/18/14/mint-1138487_150.jpg"},
            {n: "Perejil Seco", p: 1.20, img: "https://cdn.pixabay.com/photo/2016/03/05/19/02/parsley-1238241_150.jpg"},
            {n: "Ajo Molido", p: 1.50, img: "https://cdn.pixabay.com/photo/2016/01/14/11/33/garlic-1139704_150.jpg"},
            {n: "Cebolla Molida", p: 1.80, img: "https://cdn.pixabay.com/photo/2016/01/24/13/20/onion-1158814_150.jpg"},
            {n: "Cayena Entera", p: 2.20, img: "https://cdn.pixabay.com/photo/2016/01/14/11/33/chili-1139706_150.jpg"},
            {n: "Curry Madras", p: 3.10, img: "https://cdn.pixabay.com/photo/2016/01/21/11/24/spices-1153303_150.jpg"},
            {n: "Nuez Moscada", p: 3.80, img: "https://cdn.pixabay.com/photo/2016/01/14/11/33/nutmeg-1139702_150.jpg"},
            {n: "Vainilla Rama", p: 6.00, img: "https://cdn.pixabay.com/photo/2016/01/14/11/33/vanilla-1139701_150.jpg"},
            {n: "Coriandro", p: 2.30, img: "https://cdn.pixabay.com/photo/2016/01/21/11/24/coriander-1153301_150.jpg"},
            {n: "Hierbas Provenzales", p: 1.70, img: "https://cdn.pixabay.com/photo/2016/01/21/11/24/herbs-1153302_150.jpg"},
            {n: "Sal Ahumada", p: 2.10, img: "https://cdn.pixabay.com/photo/2016/01/14/11/33/salt-1139703_150.jpg"},
            {n: "Ras el Hanout", p: 3.50, img: "https://cdn.pixabay.com/photo/2016/01/21/11/24/spices-1153304_150.jpg"},
            {n: "Mostaza Grano", p: 2.10, img: "https://cdn.pixabay.com/photo/2016/01/21/11/24/mustard-1153305_150.jpg"},
            {n: "Eneldo Seco", p: 1.90, img: "https://cdn.pixabay.com/photo/2016/01/21/11/24/dill-1153306_150.jpg"},
            {n: "Canela Molida", p: 2.50, img: "https://cdn.pixabay.com/photo/2016/01/14/11/33/cinnamon-1139700_150.jpg"},
            {n: "Pebre Picante", p: 2.40, img: "https://cdn.pixabay.com/photo/2016/01/14/11/33/chili-1139705_150.jpg"},
            {n: "Comino Molido", p: 2.10, img: "https://cdn.pixabay.com/photo/2016/01/15/15/00/cumin-1141903_150.jpg"}
        ];
        
        let items = []; let total = 0;

        function cargarProductos() {
            document.getElementById('contenedor-productos').innerHTML = especies.map(e => `
                <div class="bg-white p-2 rounded-2xl shadow-sm border flex flex-col h-full overflow-hidden">
                    <img src="${e.img}" alt="${e.n}" class="w-full h-20 object-cover rounded-xl mb-2">
                    <div class="flex flex-col justify-between flex-1">
                        <p class="font-black text-gray-800 text-[9px] leading-tight mb-1">${e.n}</p>
                        <div class="flex justify-between items-center">
                            <p class="text-orange-600 font-bold text-[9px]">${e.p.toFixed(2)}€</p>
                            <button onclick="add('${e.n}', ${e.p})" class="bg-orange-600 text-white px-2 py-1 rounded-lg text-[8px] font-black uppercase">Add</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function add(n, p) {
            items.push(n); total += p;
            document.getElementById('cesta').innerHTML = items.map(i => `<div class='border-b border-orange-100 pb-1 text-[8px] font-medium'>✔ ${i}</div>`).join('');
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function enviarWhatsApp() {
            const n = document.getElementById('nombre-cli').value;
            const t = document.getElementById('tel-cli').value;
            if(!n || !t) return alert("Pon tu nombre y teléfono.");
            if(items.length === 0) return alert("Cesta vacía.");
            let m = `Pedido de: ${n} (${t})\n\n${items.join('\n')}\n\nTotal: ${total.toFixed(2)}€`;
            window.open("https://wa.me/34664417137?text=" + encodeURIComponent(m));
        }

        function cambiarSeccion(id) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }
        window.onload = cargarProductos;
    </script>
</body>
</html>
