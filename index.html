<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos María Luisa - Especias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-color { background-color: #5d4037; } 
        .seccion { display: none; }
        .seccion.activa { display: block; }
        .map-container { position: relative; padding-bottom: 75%; height: 0; overflow: hidden; border-radius: 1.5rem; }
        .map-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col lg:flex-row min-h-screen font-sans">

    <aside class="w-full lg:w-80 sidebar-color text-white flex flex-col p-6 lg:p-8 shadow-2xl lg:h-screen lg:sticky lg:top-0 shrink-0">
        <div class="flex flex-row lg:flex-col items-center justify-between lg:justify-start border-b border-orange-900 pb-4 lg:pb-8">
            <div class="bg-white p-2 rounded-2xl shadow-xl flex items-center justify-center w-20 h-20 lg:w-32 lg:h-32">
                <img src="https://raw.githubusercontent.com/andreeacameliahociota-prog/TiendaonlineMariaLuisa/main/WhatsApp%20Image%202026-03-17%20at%2015.58.42.jpeg" 
                     alt="M. Luisa" class="max-w-full max-h-full object-contain">
            </div>
            <div class="text-right lg:text-center mt-0 lg:mt-4 ml-4 lg:ml-0">
                <h1 class="text-lg lg:text-2xl font-black uppercase leading-none">M. LUISA</h1>
                <p class="text-orange-300 text-[9px] font-bold uppercase mb-2">Especias de Molina</p>
                <div class="bg-black/20 p-2 rounded-lg">
                    <p class="text-[8px] font-bold text-orange-100 uppercase">🕒 Horario:</p>
                    <p class="text-[8px]">09:00 - 14:00</p>
                </div>
            </div>
        </div>
        
        <nav class="flex flex-row lg:flex-col gap-2 mt-4 overflow-x-auto lg:overflow-visible pb-2 text-[10px] lg:text-sm font-bold">
            <button onclick="cambiarSeccion('tienda')" class="whitespace-nowrap flex-1 text-left flex items-center space-x-2 p-3 hover:bg-orange-900 rounded-xl transition"><span>🛒</span> <span>Catálogo</span></button>
            <button onclick="cambiarSeccion('pagos')" class="whitespace-nowrap flex-1 text-left flex items-center space-x-2 p-3 hover:bg-orange-900 rounded-xl transition"><span>💳</span> <span>Pagos</span></button>
            <button onclick="cambiarSeccion('ubicacion')" class="whitespace-nowrap flex-1 text-left flex items-center space-x-2 p-3 hover:bg-orange-900 rounded-xl transition"><span>📍</span> <span>Mapa</span></button>
        </nav>
    </aside>

    <main class="flex-1 p-4 lg:p-10">
        <header class="mb-6">
            <h2 class="text-xl lg:text-3xl font-black text-gray-800 uppercase">Venta Directa</h2>
            <p class="text-xs text-gray-500 italic">C. Menéndez Pelayo, 23 · Molina de Segura</p>
        </header>

        <section id="tienda" class="seccion activa">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="order-1 lg:order-2">
                    <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-gray-100 lg:sticky lg:top-10">
                        <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Cesta de Compra</h3>
                        <div id="cesta" class="text-[10px] font-medium text-gray-600 mb-6 min-h-[80px] max-h-[200px] overflow-y-auto space-y-1 py-4 bg-orange-50/50 rounded-2xl px-4 border-2 border-dashed border-orange-200">Añade productos...</div>
                        <div class="flex justify-between items-center border-t pt-4 mb-6">
                            <span class="text-2xl lg:text-3xl font-black text-gray-800"><span id="total">0.00</span>€</span>
                        </div>
                        <button onclick="enviarPedidoFinal()" class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs">Pedir por WhatsApp 📱</button>
                    </div>
                </div>

                <div class="lg:col-span-2 order-2 lg:order-1">
                    <h3 class="text-lg font-bold mb-4 text-gray-700">🌿 Nuestro Almacén:</h3>
                    <div class="grid grid-cols-2 gap-2 lg:gap-3" id="contenedor-productos"></div>
                </div>
            </div>
        </section>

        <section id="pagos" class="seccion">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 max-w-xl mx-auto text-center">
                <h3 class="text-xl font-black mb-8 uppercase">Información de Pago</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-blue-50 p-6 rounded-2xl border-2 border-blue-100">
                        <p class="text-3xl mb-1">📲</p>
                        <p class="font-black text-blue-900">BIZUM</p>
                    </div>
                    <div class="bg-green-50 p-6 rounded-2xl border-2 border-green-100">
                        <p class="text-3xl mb-1">💶</p>
                        <p class="font-black text-green-900">EFECTIVO</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="ubicacion" class="seccion">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
                <h3 class="text-xl font-black mb-2 uppercase">Recogida en Molina</h3>
                <p class="text-xs text-gray-500 mb-6">📍 Calle Menéndez Pelayo, 23</p>
                <div class="map-container shadow-lg">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3141.5!2d-1.21!3d38.05!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd6381!2sCalle%20Men%C3%A9ndez%20Pelayo%2C%2023%2C%2030500%20Molina%20de%20Segura%2C%20Murcia!5e0!3m2!1ses!2ses!4v1710680000000" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </section>
    </main>

    <script>
        const especies = [
            {n: "Pimentón Dulce", p: 3.50}, {n: "Pimentón Picante", p: 3.50}, {n: "Azafrán Hebra", p: 5.50}, {n: "Canela Rama", p: 2.80},
            {n: "Canela Molida", p: 2.50}, {n: "Pimienta Negra", p: 2.50}, {n: "Pimienta Blanca", p: 2.70}, {n: "Orégano Sierra", p: 1.90},
            {n: "Clavo Entero", p: 3.20}, {n: "Comino Molido", p: 2.10}, {n: "Comino Grano", p: 2.00}, {n: "Cúrcuma Pura", p: 2.40},
            {n: "Nuez Moscada", p: 3.80}, {n: "Jengibre Molido", p: 2.60}, {n: "Ajo Polvo", p: 1.50}, {n: "Cebolla Desh.", p: 1.80},
            {n: "Perejil Seco", p: 1.20}, {n: "Tomillo", p: 1.70}, {n: "Romero", p: 1.70}, {n: "Curry Madras", p: 3.10},
            {n: "Coriandro", p: 2.30}, {n: "Hierbabuena", p: 1.40}, {n: "Anís Estrellado", p: 4.50}, {n: "Laurel Hoja", p: 1.50},
            {n: "Cayena Entera", p: 2.20}, {n: "Vainilla Rama", p: 6.00}, {n: "Sal Ahumada", p: 2.10}, {n: "Ras el Hanout", p: 3.50},
            {n: "Pebre", p: 2.40}, {n: "Clavo Molido", p: 3.00}, {n: "Mostaza Grano", p: 2.10}, {n: "Eneldo", p: 1.90}
        ];
        let items = []; let total = 0;

        function cargarProductos() {
            document.getElementById('contenedor-productos').innerHTML = especies.map(e => `
                <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-between h-24">
                    <div class="min-w-0"><p class="font-black text-gray-800 text-[10px] leading-tight mb-1">${e.n}</p><p class="text-orange-600 font-bold text-[9px]">${e.p.toFixed(2)}€</p></div>
                    <button onclick="add('${e.n}', ${e.p})" class="bg-orange-600 text-white py-1 rounded-lg font-black text-[8px] uppercase">Añadir</button>
                </div>`).join('');
        }

        function add(n, p) {
            items.push(n); total += p;
            document.getElementById('cesta').innerHTML = items.map(i => `<div class='border-b pb-1 text-[9px] font-bold'>✔ ${i}</div>`).join('');
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function enviarPedidoFinal() {
            if(items.length === 0) return alert("Cesta vacía.");
            let pago = prompt("¿Cómo pagarás? (Bizum o Efectivo)");
            if (!pago) return;
            let texto = "¡Hola María Luisa! Pedido: " + items.join(', ') + ". Total: " + total.toFixed(2) + "€. Pago: " + pago.toUpperCase();
            window.open("https://wa.me/34664417137?text=" + encodeURIComponent(texto));
        }

        function cambiarSeccion(id) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            window.scrollTo(0,0);
        }
        window.onload = cargarProductos;
    </script>
</body>
</html>
